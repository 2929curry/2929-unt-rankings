<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트별 순위</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        @font-face {
            font-family: "GmarketSans";
            src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff") format("woff");
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "GmarketSans";
            src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff") format("woff");
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --ui-bg: #f4f4f2;
            --panel: #ffffff;
            --text: #111827;
            --muted: #5f6673;
            --border: #cfd4dc;
            --soft-border: #e5e7eb;
            --accent: #E82127;
            --accent-soft: #fff1f5;
            --accent-ink: #7A2646;
            --gold: #c89000;
            --silver: #8a919c;
            --bronze: #a45f2a;
            --font-main: "GmarketSans", "Gmarket Sans", "Noto Sans KR", "Malgun Gothic", "Segoe UI", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--ui-bg);
            color: var(--text);
            font-family: var(--font-main);
            font-weight: 500;
            min-height: 100vh;
        }

        button {
            font-family: inherit;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px;
        }

        .rank-header {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 1px 8px rgba(17, 24, 39, 0.08);
        }

        h1 {
            margin: 0;
            color: var(--text);
            font-size: clamp(20px, 2.4vw, 28px);
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .rank-subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .version-badge {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 6px 10px;
            border: 1px solid #F8C7D6;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent-ink);
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .data-import-btn {
            padding: 8px 14px;
            border: 1px solid #d8dee8;
            border-radius: 8px;
            background: linear-gradient(#fff, #f8fafc);
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.15s ease;
        }

        .data-import-btn:hover {
            background: #f8fafc;
            color: var(--accent-ink);
            border-color: #F8C7D6;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #fefefe;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d8dee8;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #F8C7D6;
            box-shadow: 0 0 0 3px rgba(232, 33, 39, 0.10);
        }

        .form-hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-footer button {
            min-height: 34px;
            padding: 7px 16px;
            border: 1px solid #d8dee8;
            border-radius: 8px;
            background: linear-gradient(#fff, #f8fafc);
            color: var(--text);
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.15s ease;
        }

        .modal-footer button:hover {
            background: #f8fafc;
            border-color: #F8C7D6;
            color: var(--accent-ink);
        }

        .modal-footer .primary-btn {
            background: #111827;
            border-color: #111827;
            color: #fff;
        }

        .modal-footer .primary-btn:hover {
            background: #242b38;
            border-color: #242b38;
            color: #fff;
        }

        .status-message {
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
            display: none;
        }

        .status-message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .event-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(17, 24, 39, 0.06);
            overflow-x: auto;
        }

        .tab-button,
        .sheet-actions button,
        .sheet-menu summary,
        .sheet-menu-panel button,
        .zoom-button {
            min-height: 34px;
            padding: 7px 13px;
            border: 1px solid #d8dee8;
            border-radius: 8px;
            background: linear-gradient(#fff, #f8fafc);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.2;
            white-space: nowrap;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }

        .tab-button:hover,
        .sheet-actions button:hover,
        .sheet-menu summary:hover,
        .sheet-menu-panel button:hover,
        .zoom-button:hover {
            background: #f8fafc;
            color: var(--accent-ink);
            border-color: #F8C7D6;
        }

        .tab-button.active {
            background: var(--accent-soft);
            color: var(--accent-ink);
            border-color: #F8C7D6;
        }

        .event-section {
            display: none;
            padding: 18px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(17, 24, 39, 0.10);
            animation: fadeIn 0.2s ease;
        }

        .event-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 16px;
        }

        .event-title {
            margin: 0 0 16px;
            padding-left: 12px;
            border-left: 4px solid var(--accent);
            color: var(--text);
            font-size: clamp(18px, 2vw, 24px);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .section-head .event-title {
            margin-bottom: 0;
        }

        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rank-item {
            display: grid;
            grid-template-columns: 62px minmax(0, 1fr);
            align-items: center;
            gap: 12px;
            min-height: 58px;
            padding: 10px 14px;
            border: 1px solid var(--soft-border);
            border-left: 5px solid #d8dee8;
            border-radius: 8px;
            background: #fff;
            transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
        }

        .rank-item:hover {
            transform: translateX(2px);
            border-color: var(--border);
            box-shadow: 0 4px 14px rgba(17, 24, 39, 0.08);
        }

        .rank-item.top-1 {
            border-left-color: var(--gold);
            background: linear-gradient(90deg, #fff8dc 0, #fff 44%);
        }

        .rank-item.top-2 {
            border-left-color: var(--silver);
            background: linear-gradient(90deg, #f3f4f6 0, #fff 44%);
        }

        .rank-item.top-3 {
            border-left-color: var(--bronze);
            background: linear-gradient(90deg, #fff3e8 0, #fff 44%);
        }

        .rank-number {
            min-width: 0;
            color: #374151;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            line-height: 1;
        }

        .rank-item.top-1 .rank-number {
            color: var(--gold);
        }

        .rank-item.top-2 .rank-number {
            color: var(--silver);
        }

        .rank-item.top-3 .rank-number {
            color: var(--bronze);
        }

        .medal {
            display: inline-block;
            margin-left: 4px;
            font-size: 18px;
            vertical-align: 1px;
        }

        .rank-info {
            min-width: 0;
        }

        .player-name {
            margin-bottom: 5px;
            color: var(--text);
            font-weight: 700;
            word-break: break-word;
        }

        .player-score {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .score-value {
            color: var(--accent);
            font-weight: 700;
        }

        .empty-rank-message {
            padding: 18px;
            border: 1px dashed #d8dee8;
            border-radius: 8px;
            background: #f8fafc;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            text-align: center;
        }

        @media (max-width: 720px) {
            .container {
                padding: 10px;
            }

            .rank-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .version-badge {
                text-align: left;
            }

            .event-section {
                padding: 12px;
            }

            .rank-item {
                grid-template-columns: 52px minmax(0, 1fr);
                gap: 10px;
                padding: 9px 10px;
            }

            .rank-number {
                font-size: 19px;
            }

            .player-name {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="rank-header">
            <div>
                <h1>2929 UNT Rankings</h1>
                <p class="rank-subtitle">이벤트별 순위</p>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button class="data-import-btn" onclick="openDataModal()">📊 데이터 import</button>
                <span class="version-badge">Local/Web</span>
            </div>
        </header>

        <div id="dataModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">데이터 import</div>
                <div id="statusMessage" class="status-message"></div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>데이터 소스 유형</label>
                        <select id="sourceType" onchange="updateSourceHint()">
                            <option value="csv">CSV 파일 URL</option>
                            <option value="google">Google Sheets (공개)</option>
                        </select>
                        <div class="form-hint" id="sourceHint">CSV 파일의 직접 다운로드 링크를 입력하세요</div>
                    </div>

                    <div class="form-group">
                        <label>URL</label>
                        <input type="text" id="dataUrl" placeholder="https://example.com/data.csv">
                    </div>

                    <div class="form-group">
                        <label>이벤트 선택</label>
                        <select id="eventSelect">
                            <option value="nameEvent">명함 이벤트</option>
                            <option value="prepareEvent">준비전</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="closeDataModal()">취소</button>
                    <button class="primary-btn" onclick="importData()">불러오기</button>
                </div>
            </div>
        </div>

        <div class="event-tabs">
            <button type="button" class="tab-button active" data-event-target="name-event" onclick="showEvent('name-event', this)">명함 이벤트</button>
            <button type="button" class="tab-button" data-event-target="prepare-event" onclick="showEvent('prepare-event', this)">준비전</button>
        </div>

        <div id="name-event" class="event-section active">
            <h2 class="event-title">명함 이벤트</h2>
            <div class="ranking-list" id="nameRankingList"></div>
        </div>

        <div id="prepare-event" class="event-section">
            <h2 class="event-title">준비전</h2>
            <div class="ranking-list" id="prepareRankingList"></div>
        </div>
    </div>

    <script>
        const INITIAL_RANKINGS_DATA = {
            nameEvent: [
                { rank: 1, nickname: '[InX]Frostnight', score: '188,929,277' },
                { rank: 2, nickname: '인소전트', score: '140,768,728' },
                { rank: 3, nickname: '[TPE]Akira愛', score: '109,809,083' },
                { rank: 4, nickname: '[EXO]로이⁹ROY', score: '109,552,265' },
                { rank: 5, nickname: '[EXO]童麓 II', score: '109,225,997' },
                { rank: 6, nickname: '[UNT]Moodeng', score: '95,908,384' },
                { rank: 7, nickname: '[TPE]M.iMε.ω', score: '84,572,237' },
                { rank: 8, nickname: '[TPE]Twinkle Twinkle', score: '81,664,382' }
            ],
            prepareEvent: [
                { rank: 1, nickname: '[UNT]Absalom', score: '169,403,299' },
                { rank: 2, nickname: '[InX]AmericanoOnBuffs', score: '140,147,730' },
                { rank: 3, nickname: '[EXO]Ladypixel\'ᵋ~exo', score: '136,684,470' },
                { rank: 4, nickname: '[UNT]INSURGENT ROAMER', score: '126,801,965' },
                { rank: 5, nickname: '[EXO]Umer', score: '123,708,182' }
            ]
        };

        let rankingsData = { ...INITIAL_RANKINGS_DATA };

        function showEvent(eventId, sourceButton) {
            document.querySelectorAll('.event-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('active');
            });
            const section = document.getElementById(eventId);
            if (section) section.classList.add('active');
            if (sourceButton) sourceButton.classList.add('active');
        }

        function openDataModal() {
            document.getElementById('dataModal').classList.add('show');
        }

        function closeDataModal() {
            document.getElementById('dataModal').classList.remove('show');
            document.getElementById('statusMessage').textContent = '';
            document.getElementById('statusMessage').className = 'status-message';
        }

        function updateSourceHint() {
            const sourceType = document.getElementById('sourceType').value;
            const hint = document.getElementById('sourceHint');
            if (sourceType === 'csv') {
                hint.textContent = 'CSV 파일의 직접 다운로드 링크를 입력하세요';
            } else {
                hint.textContent = '공개 공유 설정된 Google Sheets URL을 입력하세요';
            }
        }

        async function importData() {
            const sourceType = document.getElementById('sourceType').value;
            const url = document.getElementById('dataUrl').value.trim();
            const eventSelect = document.getElementById('eventSelect').value;
            const statusMsg = document.getElementById('statusMessage');

            if (!url) {
                showStatus('URL을 입력해주세요', 'error');
                return;
            }

            try {
                let csvUrl = url;

                if (sourceType === 'google') {
                    if (url.includes('/edit')) {
                        const sheetId = url.match(/\/d\/([a-zA-Z0-9-_]+)/)[1];
                        csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
                    } else if (url.includes('/spreadsheets')) {
                        const sheetId = url.match(/\/d\/([a-zA-Z0-9-_]+)/)[1];
                        csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
                    }
                }

                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error('파일을 불러올 수 없습니다');

                const text = await response.text();
                const result = Papa.parse(text, { header: true });
                const data = result.data.filter(row => row.rank && row.nickname);

                const formattedData = data.map(row => ({
                    rank: Number(row.rank),
                    nickname: String(row.nickname).trim(),
                    score: String(row.score || '').trim()
                })).sort((a, b) => a.rank - b.rank);

                rankingsData[eventSelect === 'nameEvent' ? 'nameEvent' : 'prepareEvent'] = formattedData;
                localStorage.setItem('rankingsData', JSON.stringify(rankingsData));

                renderRankings();
                showStatus(`✅ ${formattedData.length}개 데이터 불러오기 완료!`, 'success');

                setTimeout(() => closeDataModal(), 1500);
            } catch (error) {
                console.error(error);
                showStatus(`❌ 데이터 불러오기 실패: ${error.message}`, 'error');
            }
        }

        function showStatus(message, type) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.textContent = message;
            statusMsg.className = `status-message ${type}`;
        }

        function renderRankings() {
            renderRankList('nameRankingList', rankingsData.nameEvent);
            renderRankList('prepareRankingList', rankingsData.prepareEvent);
        }

        function renderRankList(listId, data) {
            const list = document.getElementById(listId);
            if (!list) return;

            list.innerHTML = '';

            if (!data || data.length === 0) {
                list.innerHTML = '<div class="empty-rank-message">데이터가 없습니다</div>';
                return;
            }

            data.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = `rank-item ${item.rank === 1 ? 'top-1' : item.rank === 2 ? 'top-2' : item.rank === 3 ? 'top-3' : ''}`.trim();

                const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
                const medal = medals[item.rank] ? `<span class="medal">${medals[item.rank]}</span>` : '';

                itemEl.innerHTML = `
                    <div class="rank-number">${item.rank}${medal}</div>
                    <div class="rank-info">
                        <div class="player-name">${item.nickname}</div>
                        <div class="player-score">점수: <span class="score-value">${item.score}</span></div>
                    </div>
                `;
                list.appendChild(itemEl);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('rankingsData');
            if (saved) {
                rankingsData = JSON.parse(saved);
            }
            renderRankings();

            document.getElementById('dataModal').addEventListener('click', (e) => {
                if (e.target.id === 'dataModal') closeDataModal();
            });
        });
    </script>
</body>
</html>
