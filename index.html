        function hasColumnData(sheet, columnIndexes) {
            return sheet.rows.some(row => {
                return columnIndexes.some(index => index >= 0 && String(row.cells[index] || '').trim());
            });
        }

        function seedRankData(year, month, week, eventName, listId) {
            const items = extractRankItems(listId);
            if (!items.length) return;

            const key = sheetKey(year, month);
            if (!appState.months[key]) {
                appState.months[key] = makeDefaultSheet(month);
            }
            appState.months[key] = normalizeSheet(appState.months[key], month);
            const sheet = appState.months[key];
            const nicknameCol = findSimpleWeekFieldColumn(sheet, week, '닉네임');
            const scoreCol = findSimpleWeekFieldColumn(sheet, week, '점수');
            if (nicknameCol < 0 || scoreCol < 0) return;
            if (hasColumnData(sheet, [nicknameCol, scoreCol])) return;

            const maxRank = Math.max(...items.map(item => item.rank));
            while (sheet.rows.length < maxRank) {
                sheet.rows.push(makeEmptyRow(sheet.columns.length));
            }

            setWeekEvent(sheet, week, eventName);
            items.forEach(item => {
                const row = sheet.rows[item.rank - 1];
                if (!row) return;
                row.cells[nicknameCol] = item.nickname;
                row.cells[scoreCol] = item.score;
            });
        }

        function removeMayBExtraColumn() {
            const key = sheetKey(2026, 5);
            const sheet = appState.months[key];
            if (!sheet || !Array.isArray(sheet.columns) || sheet.columns.length <= WEEK_COUNT * 2) return false;

            const targetIndex = 1;
            const column = sheet.columns[targetIndex];
            const field = String(column?.field || '');
            const isExtraColumn = column && (column.custom || !column.week || /추가\s*열|추가열/.test(field));
            if (!isExtraColumn) return false;

            sheet.columns.splice(targetIndex, 1);
            sheet.rows.forEach(row => {
                if (Array.isArray(row.cells)) row.cells.splice(targetIndex, 1);
            });
            return true;
        }

        function bindSheetEvents() {
            const table = document.getElementById('weeklyRankTable');
            const formulaInput = document.getElementById('formulaInput');
            if (!table) return;

            table.addEventListener('click', event => {
                const cell = event.target.closest('.sheet-cell');
                if (!cell) return;
                setActiveCell(Number(cell.dataset.row), Number(cell.dataset.col), event.shiftKey);
            });

            table.addEventListener('change', event => {
                const select = event.target.closest('.week-event-select');
                if (!select) return;
                const week = Number(select.dataset.week);
                const eventName = select.value;

                if (eventName === '__ADD_EVENT__') {
                    select.value = getWeekEvent(currentSheet(), week);
                    openAddEventModal(week);
                    return;
                }

                const sheet = currentSheet();
                if (getWeekEvent(sheet, week) !== eventName) recordHistory();
                setWeekEvent(sheet, week, eventName);
                if (EVENTS.includes(eventName)) {
                    appState.viewWeeks = { ...DEFAULT_VIEW_WEEKS, ...(appState.viewWeeks || {}), [eventName]: week };
                }
                syncControlsFromState();
                renderWeeklySheet();
                saveSheetData({ silent: true });
            });

            table.addEventListener('focusin', event => {
                const cell = event.target.closest('.sheet-cell');
                if (!cell) return;
                const row = Number(cell.dataset.row);
                const col = Number(cell.dataset.col);
                if (isNoneColumn(currentSheet().columns[col])) {
                    cell.blur();
                    return;
                }
                setActiveCell(row, col);
                cell.textContent = getCellRaw(row, col);
            });

            table.addEventListener('focusout', event => {
                const cell = event.target.closest('.sheet-cell');
                if (cell) finalizeCell(cell);
            });

            table.addEventListener('input', event => {
                const cell = event.target.closest('.sheet-cell');
                if (!cell) return;
                if (cell.classList.contains('readonly')) return;
                setCellRaw(Number(cell.dataset.row), Number(cell.dataset.col), cell.textContent, { dirty: true });
                updateCellDisplays();
                updateFormulaBar();
                renderRankViews();
                scheduleSave(cell);
            });

            table.addEventListener('paste', event => {
                const cell = event.target.closest('.sheet-cell');
                if (!cell) return;
                if (cell.classList.contains('readonly')) return;
                event.preventDefault();
                const text = (event.clipboardData || window.clipboardData).getData('text/plain');
                pasteGrid(text, Number(cell.dataset.row), Number(cell.dataset.col));
            });

            table.addEventListener('keydown', event => {
                const cell = event.target.closest('.sheet-cell');
                if (!cell) return;

                if (event.key === 'Enter') {
                    event.preventDefault();
                    finalizeCell(cell);
                    moveFocus(event.shiftKey ? 'up' : 'down');
                }

                if (event.key === 'Tab') {
                    event.preventDefault();
                    finalizeCell(cell);
                    moveFocus(event.shiftKey ? 'previous' : 'next');
                }
            });

            formulaInput?.addEventListener('input', () => {
                setCellRaw(activeCell.row, activeCell.col, formulaInput.value, { dirty: true });
                const cell = getCellElement(activeCell.row, activeCell.col);
                if (cell) cell.classList.add('dirty');
                updateCellDisplays();
                renderRankViews();
                scheduleSave(cell);
            });

            formulaInput?.addEventListener('keydown', event => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    focusCell(activeCell.row, activeCell.col);
                }
            });

            document.addEventListener('copy', event => {
                const activeElement = document.activeElement;
                if (!activeElement || !activeElement.closest || !activeElement.closest('#weeklyRankTable')) return;
                event.preventDefault();
                event.clipboardData.setData('text/plain', buildSelectedText(true));
                setSheetStatus('선택 영역 복사됨');
            });
        }

        function detectColumnNames(headers) {
            const nicknameAliases = ['nickname', '닉네임', '사용자명', '이름', '플레이어', 'name', 'username', '유저명'];
            const scoreAliases = ['score', '점수', '스코어', 'points', '포인트', '값'];

            const foundNickname = headers.find(h => nicknameAliases.some(alias => String(h || '').toLowerCase().includes(alias.toLowerCase())));
            const foundScore = headers.find(h => scoreAliases.some(alias => String(h || '').toLowerCase().includes(alias.toLowerCase())));

            return { nicknameCol: foundNickname, scoreCol: foundScore };

        async function importDataFromCsv() {
            const year = Number(document.getElementById('importYearSelect').value);
            const month = Number(document.getElementById('importMonthSelect').value);
            const week = Number(document.getElementById('importWeekSelect').value);
            const fileInput = document.getElementById('importCsvFile');
            const urlInput = document.getElementById('importCsvUrl');

            if (!fileInput.files.length && !urlInput.value.trim()) {
                showImportStatus('파일을 선택하거나 URL을 입력해주세요', true);
                return;
            }

            try {
                let csvText;

                if (fileInput.files.length > 0) {
                    csvText = await fileInput.files[0].text();
                } else {
                    const response = await fetch(urlInput.value.trim());
                    if (!response.ok) throw new Error('URL에서 파일을 불러올 수 없습니다');
                    csvText = await response.text();
                }

                const result = Papa.parse(csvText, { header: true });
                const headers = Object.keys(result.data[0] || {});
                const { nicknameCol, scoreCol } = detectColumnNames(headers);

                if (!nicknameCol) {
                    showImportStatus(`헤더를 찾을 수 없습니다. 가능한 헤더: ${headers.join(', ')}`, true);
                    return;
                }

                const data = result.data
                    .filter(row => row[nicknameCol] && String(row[nicknameCol]).trim())
                    .map(row => ({
                        nickname: String(row[nicknameCol]).trim(),
                        score: scoreCol ? String(row[scoreCol] || '').trim() : ''
                    }))
                    .filter(row => row.nickname);

                if (data.length === 0) {
                    showImportStatus(`유효한 데이터가 없습니다. 헤더: ${headers.join(', ')}`, true);
                    return;
                }

                const key = sheetKey(year, month);
                if (!appState.months[key]) {
                    appState.months[key] = makeDefaultSheet(month);
                }
                appState.months[key] = normalizeSheet(appState.months[key], month);

                const sheet = appState.months[key];
                const nicknameColIndex = findSimpleWeekFieldColumn(sheet, week, '닉네임');
                const scoreColIndex = findSimpleWeekFieldColumn(sheet, week, '점수');

                if (nicknameColIndex < 0 || scoreColIndex < 0) {
                    showImportStatus('주차 열을 찾을 수 없습니다', true);
                    return;
                }

                const maxRank = Math.min(data.length, sheet.rows.length);
                data.forEach((row, index) => {
                    if (index >= maxRank) return;
                    sheet.rows[index].cells[nicknameColIndex] = row.nickname;
                    sheet.rows[index].cells[scoreColIndex] = row.score;
                });

                setWeekEvent(sheet, week, EVENTS[0]);
                saveSheetData({ silent: true });

                showImportStatus(`✅ ${data.length}개 데이터 import 완료!`);
                setTimeout(() => closeDataImportModal(), 1500);
            } catch (error) {
                showImportStatus(`❌ 오류: ${error.message}`, true);
            }
        }

        async function saveToGoogleSheets() {
            const sheet = currentSheet();
            const rows = [];

            sheet.rows.forEach((rowData, rowIndex) => {
                const nicknameIdx = sheet.columns.findIndex(col => col.field === '닉네임' && col.week === 1);
                const scoreIdx = sheet.columns.findIndex(col => col.field === '점수' && col.week === 1);

                if (nicknameIdx < 0 || scoreIdx < 0) return;

                const nickname = String(getCellDisplay(rowIndex, nicknameIdx) || '').trim();
                const score = String(getCellDisplay(rowIndex, scoreIdx) || '').trim();

                if (!nickname || !score) return;

                for (let week = 1; week <= WEEK_COUNT; week++) {
                    const eventName = getWeekEvent(sheet, week);
                    if (eventName === EVENT_NONE) continue;

                    const nickCol = sheet.columns.findIndex(c => c.week === week && c.field === '닉네임');
                    const scoreCol = sheet.columns.findIndex(c => c.week === week && c.field === '점수');

                    if (nickCol >= 0 && scoreCol >= 0) {
                        const nick = String(getCellDisplay(rowIndex, nickCol) || '').trim();
                        const scr = String(getCellDisplay(rowIndex, scoreCol) || '').trim();

                        if (nick && scr) {
                            rows.push({
                                nickname: nick,
                                score: scr,
                                year: appState.selectedYear,
                                month: appState.selectedMonth,
                                week: week,
                                event: eventName
                            });
                        }
                    }
                }
            });

            if (rows.length === 0) {
                alert('저장할 데이터가 없습니다');
                return;
            }

            try {
                setSheetStatus('Google Sheets에 저장 중...');

                for (const row of rows) {
                    const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(row)
                    });

                    const result = await response.json();
                    if (!result.success) {
                        throw new Error('저장 실패');
                    }
                }

                setSheetStatus(`✅ ${rows.length}개 데이터를 Google Sheets에 저장했습니다!`);
            } catch (error) {
                setSheetStatus(`❌ Google Sheets 저장 실패: ${error.message}`);
            }
        }
    </script>
</body>
</html>
